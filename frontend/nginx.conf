# frontend/nginx.conf
#
# Nginx server configuration for the production container.
#
# Nginx serves two types of requests:
#   1. Static files (HTML, JS, CSS, images) — served directly from /usr/share/nginx/html
#   2. API requests (/api/*) — proxied to the FastAPI backend container
#
# This mirrors the Vite dev server proxy configured in vite.config.ts.
#
# In Docker Compose, the backend service is reachable at http://backend:8000
# because Docker's internal DNS resolves "backend" to the backend container IP.

server {
    listen 80;
    server_name localhost;

    # Root directory where the React build output is served from
    root /usr/share/nginx/html;
    index index.html;

    # ── React Router (client-side routing) ─────────────────────────────────────
    # React Router handles navigation in the browser (e.g. /lots/LOT-A).
    # When the user refreshes or navigates directly to a route, Nginx must
    # serve index.html (not return 404), and then React Router renders the correct page.
    #
    # `try_files $uri $uri/ /index.html` means:
    #   1. Try to serve the exact file ($uri), e.g. /assets/index.js
    #   2. Try to serve it as a directory ($uri/), e.g. /assets/
    #   3. Fall back to /index.html for all other paths (React routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ───────────────────────────────────────────────────────────────
    # Forward all requests starting with /api to the FastAPI backend.
    # The backend service name "backend" is resolved by Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Required for WebSocket support (if added later)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Caching headers for static assets ───────────────────────────────────────
    # Vite generates content-hashed filenames for JS/CSS bundles (e.g. index-abc123.js).
    # Since the filename changes when content changes, assets can be cached forever.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
